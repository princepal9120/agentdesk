version: "3.9"

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  agent:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    command: python -m agent.agent

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentdesk
      POSTGRES_USER: agentdesk
      POSTGRES_PASSWORD: agentdesk_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
