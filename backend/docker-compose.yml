version: '3.8'

services:
  # PostgreSQL Database (Shared)
  postgres:
    image: postgres:16-alpine
    container_name: medvoice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medvoice
      POSTGRES_PASSWORD: medvoice_password
      POSTGRES_DB: medvoice
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U medvoice']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medvoice-network

  # Redis Cache (Shared)
  redis:
    image: redis:7-alpine
    container_name: medvoice-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medvoice-network

  # API Gateway
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: medvoice-gateway
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://medvoice:medvoice_password@postgres:5432/medvoice?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_started
      voice-agent:
        condition: service_started
      appointments:
        condition: service_started
      notifications:
        condition: service_started
    volumes:
      - ./apps/gateway:/app/apps/gateway
      - ./libs:/app/libs
      - ./logs:/app/logs
    networks:
      - medvoice-network

  # Auth Service
  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    container_name: medvoice-auth
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://medvoice:medvoice_password@postgres:5432/medvoice?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/auth:/app/apps/auth
      - ./libs:/app/libs
    networks:
      - medvoice-network

  # Voice Agent Service
  voice-agent:
    build:
      context: .
      dockerfile: apps/voice-agent/Dockerfile
    container_name: medvoice-voice-agent
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://medvoice:medvoice_password@postgres:5432/medvoice?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/voice-agent:/app/apps/voice-agent
      - ./libs:/app/libs
    networks:
      - medvoice-network

  # Appointments Service
  appointments:
    build:
      context: .
      dockerfile: apps/appointments/Dockerfile
    container_name: medvoice-appointments
    restart: unless-stopped
    ports:
      - '3003:3003'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://medvoice:medvoice_password@postgres:5432/medvoice?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/appointments:/app/apps/appointments
      - ./libs:/app/libs
    networks:
      - medvoice-network

  # Notifications Service
  notifications:
    build:
      context: .
      dockerfile: apps/notifications/Dockerfile
    container_name: medvoice-notifications
    restart: unless-stopped
    ports:
      - '3004:3004'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://medvoice:medvoice_password@postgres:5432/medvoice?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3004
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/notifications:/app/apps/notifications
      - ./libs:/app/libs
    networks:
      - medvoice-network

volumes:
  postgres_data:
  redis_data:

networks:
  medvoice-network:
    driver: bridge
